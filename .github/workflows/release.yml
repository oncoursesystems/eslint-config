name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: self-hosted
    permissions:
      contents: write # create the GitHub release
      id-token: write # OIDC token for npm trusted publishing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm CLI >= 11.5.1.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Publishes via OIDC trusted publishing — no token needed. Requires a
      # trusted publisher to be configured for this package on npmjs.com
      # (GitHub Actions, repo oncoursesystems/eslint-config, workflow release.yml).
      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          makeLatest: true
